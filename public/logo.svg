<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <radialGradient id="glowBg" cx="60%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="15" y1="85" x2="75" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="30%" stop-color="#9333ea"/>
      <stop offset="55%" stop-color="#db2777"/>
      <stop offset="80%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="30" y1="80" x2="60" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f9a8d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fdba74" stop-opacity="0"/>
    </linearGradient>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <ellipse cx="58" cy="56" rx="28" ry="28" fill="url(#glowBg)"/>

  <!-- Main yin-yang flame body (outer) -->
  <path d="
    M 50 12
    C 63 12, 76 22, 78 38
    C 80 54, 72 66, 63 73
    C 58 77, 53 80, 50 85
    C 38 85, 22 73, 22 55
    C 22 35, 36 12, 50 12 Z
  " fill="url(#bodyGrad)" filter="url(#outerGlow)"/>

  <!-- Inner S-curve (yin-yang divider) -->
  <path d="
    M 50 12
    C 56 25, 58 38, 50 50
    C 42 62, 44 74, 50 85
    C 38 85, 22 73, 22 55
    C 22 35, 36 12, 50 12 Z
  " fill="url(#bodyGrad)" opacity="0.7"/>

  <!-- Shine overlay -->
  <path d="
    M 50 12
    C 56 25, 58 38, 50 50
    C 42 62, 44 74, 50 85
    C 38 85, 22 73, 22 55
    C 22 35, 36 12, 50 12 Z
  " fill="url(#shineGrad)"/>

  <!-- Left flame tongues (purple spikes) -->
  <path d="M 36 38 C 33 30, 36 21, 39 14 C 40 20, 38 28, 42 33 C 43 26, 46 17, 47 12 C 49 19, 47 28, 50 34"
    fill="url(#bodyGrad)" opacity="0.95" filter="url(#outerGlow)"/>

  <!-- Inner highlight line -->
  <path d="M 50 18 C 50 30, 50 40, 50 50 C 50 60, 50 72, 50 82"
    stroke="url(#shineGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Orange rim highlight (right arc) -->
  <path d="M 65 30 C 76 40, 78 58, 68 72"
    stroke="#f97316" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6" filter="url(#outerGlow)"/>
</svg>
